name: CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Build (Debug)
        run: swift build
      - name: Run Tests
        run: swift test
      - name: Build (Release)
        run: swift build -c release
      - name: Build with Address Sanitizer
        run: swift build -c debug -Xswiftc -sanitize=address -Xlinker -fsanitize=address
