name: CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
      - name: Build (Debug)
        run: swift build
      - name: Run Tests
        run: swift test
      - name: Build (Release)
        run: swift build -c release
